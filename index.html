<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Interactive Layout Map</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    overflow:hidden;
}

.topbar{
    height:70px;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    padding:10px;
    flex-wrap:wrap;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

.zoom-btn{
    background:#0d6efd;
    color:white;
}

.reset-btn{
    background:#444;
    color:white;
}

.legend{
    display:flex;
    align-items:center;
    gap:8px;
}

.box{
    width:20px;
    height:20px;
    border-radius:4px;
}

.green{
    background:#22c55e;
}

.red{
    background:#ef4444;
}

.viewer{
    width:100vw;
    height:calc(100vh - 70px);
    overflow:hidden;
    position:relative;
    cursor:grab;
    background:#ddd;
}

.map-wrapper{
    position:absolute;
    transform-origin:top left;
}

.map-image{
    width:1400px;
    display:block;
}

.plot{
    position:absolute;
    border:2px solid #000;
    cursor:pointer;
    opacity:0.4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    transition:0.2s;
}

.plot:hover{
    opacity:0.8;
}

.plot.unsold{
    background:rgba(0,255,0,0.4);
}

.plot.sold{
    background:rgba(255,0,0,0.45);
}

.info{
    color:white;
    font-size:15px;
}

</style>
</head>

<body>

<div class="topbar">

    <button class="zoom-btn" onclick="zoomIn()">+</button>

    <button class="zoom-btn" onclick="zoomOut()">-</button>

    <button class="reset-btn" onclick="resetView()">Reset</button>

    <div class="legend">
        <div class="box green"></div>
        <span>Unsold</span>
    </div>

    <div class="legend">
        <div class="box red"></div>
        <span>Sold</span>
    </div>

    <div class="info">
        Sold: <span id="soldCount">0</span> |
        Unsold: <span id="unsoldCount">0</span>
    </div>

</div>

<div class="viewer" id="viewer">

    <div class="map-wrapper" id="mapWrapper">

        <!-- ORIGINAL MAP -->
        <img src="layout-map.jpg" class="map-image"/>

    </div>

</div>

<script>

/*
PLOT POSITIONS
Adjust for exact alignment
*/

const plots = [

{ no:1, x:70, y:140, w:100, h:170 },
{ no:2, x:170, y:140, w:100, h:170 },
{ no:3, x:270, y:140, w:100, h:170 },
{ no:4, x:370, y:140, w:110, h:170 },

{ no:5, x:700, y:140, w:100, h:170 },
{ no:6, x:600, y:140, w:100, h:170 },
{ no:7, x:500, y:140, w:100, h:170 },
{ no:8, x:400, y:140, w:100, h:170 },

{ no:9, x:70, y:320, w:100, h:120 },
{ no:10, x:70, y:450, w:100, h:120 },
{ no:11, x:70, y:570, w:100, h:120 },
{ no:12, x:70, y:690, w:100, h:120 },

{ no:13, x:70, y:810, w:100, h:120 },

{ no:14, x:350, y:810, w:140, h:120 },
{ no:15, x:350, y:690, w:140, h:120 },
{ no:16, x:350, y:570, w:140, h:120 },
{ no:17, x:350, y:450, w:140, h:120 },

{ no:18, x:500, y:450, w:140, h:120 },
{ no:19, x:500, y:570, w:140, h:120 },
{ no:20, x:500, y:690, w:140, h:150 },

{ no:21, x:700, y:580, w:140, h:170 },
{ no:22, x:700, y:450, w:140, h:120 },

{ no:23, x:850, y:450, w:120, h:170 },
{ no:24, x:970, y:450, w:120, h:170 },

{ no:25, x:1080, y:300, w:120, h:140 },
{ no:26, x:960, y:300, w:120, h:140 },
{ no:27, x:840, y:300, w:120, h:140 },
{ no:28, x:720, y:300, w:120, h:140 },
{ no:29, x:600, y:300, w:120, h:140 },

{ no:30, x:720, y:140, w:120, h:140 },
{ no:31, x:840, y:140, w:120, h:140 },
{ no:32, x:960, y:140, w:120, h:140 },
{ no:33, x:1080, y:140, w:120, h:140 }

];

const wrapper = document.getElementById("mapWrapper");

plots.forEach(plot => {

    const div = document.createElement("div");

    div.className = "plot unsold";

    div.style.left = plot.x + "px";
    div.style.top = plot.y + "px";
    div.style.width = plot.w + "px";
    div.style.height = plot.h + "px";

    div.innerText = plot.no;

    div.dataset.status = "unsold";

    div.onclick = (e)=>{
        e.stopPropagation();
        togglePlot(div);
    };

    wrapper.appendChild(div);

});

function togglePlot(plot){

    if(plot.dataset.status === "unsold"){

        plot.dataset.status = "sold";

        plot.classList.remove("unsold");
        plot.classList.add("sold");

    }else{

        plot.dataset.status = "unsold";

        plot.classList.remove("sold");
        plot.classList.add("unsold");

    }

    updateCounts();
}

function updateCounts(){

    const sold = document.querySelectorAll(".plot.sold").length;
    const unsold = document.querySelectorAll(".plot.unsold").length;

    document.getElementById("soldCount").innerText = sold;
    document.getElementById("unsoldCount").innerText = unsold;
}

updateCounts();

/* ZOOM */

let scale = 1;
let posX = 0;
let posY = 0;

function applyTransform(){
    wrapper.style.transform =
        `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function zoomIn(){
    scale += 0.1;
    applyTransform();
}

function zoomOut(){
    scale -= 0.1;

    if(scale < 0.5) scale = 0.5;

    applyTransform();
}

function resetView(){
    scale = 1;
    posX = 0;
    posY = 0;
    applyTransform();
}

/* DRAG */

const viewer = document.getElementById("viewer");

let isDragging = false;
let startX, startY;

viewer.addEventListener("mousedown", (e)=>{

    isDragging = true;

    startX = e.clientX - posX;
    startY = e.clientY - posY;

    viewer.style.cursor = "grabbing";
});

viewer.addEventListener("mouseup", ()=>{

    isDragging = false;

    viewer.style.cursor = "grab";
});

viewer.addEventListener("mouseleave", ()=>{

    isDragging = false;
});

viewer.addEventListener("mousemove", (e)=>{

    if(!isDragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    applyTransform();
});

/* MOUSE WHEEL ZOOM */

viewer.addEventListener("wheel", (e)=>{

    e.preventDefault();

    if(e.deltaY < 0){

        scale += 0.1;

    }else{

        scale -= 0.1;

        if(scale < 0.5) scale = 0.5;
    }

    applyTransform();

});

</script>

</body>
</html>
