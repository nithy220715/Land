<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clickable Layout Map</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.toolbar{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

.zoom-btn{
    background:#0d6efd;
    color:white;
}

.reset-btn{
    background:#444;
    color:white;
}

.legend{
    display:flex;
    align-items:center;
    gap:8px;
}

.box{
    width:20px;
    height:20px;
    border-radius:4px;
}

.green{
    background:#22c55e;
}

.red{
    background:#ef4444;
}

.viewer{
    width:100vw;
    height:calc(100vh - 80px);
    overflow:hidden;
    background:#ddd;
    position:relative;
    cursor:grab;
}

.map{
    position:absolute;
    width:1400px;
    height:950px;
    background:#f7efb0;
    transform-origin:top left;
    border:3px solid #222;
}

/* Roads */

.road-horizontal{
    position:absolute;
    background:#d7d7d7;
    border:1px solid #333;
}

.road-vertical{
    position:absolute;
    background:#d7d7d7;
    border:1px solid #333;
}

/* Plots */

.plot{
    position:absolute;
    border:2px solid #222;
    background:rgba(0,255,0,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.plot:hover{
    transform:scale(1.03);
    z-index:99;
}

.plot.sold{
    background:rgba(255,0,0,0.45);
}

.plot.unsold{
    background:rgba(0,255,0,0.35);
}

.info-box{
    position:fixed;
    right:20px;
    top:100px;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:220px;
}

.info-box h3{
    margin-bottom:10px;
}

.title{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    font-size:34px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="toolbar">

    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">-</button>
    <button class="reset-btn" onclick="resetView()">Reset</button>

    <div class="legend">
        <div class="box green"></div>
        <span>Unsold</span>
    </div>

    <div class="legend">
        <div class="box red"></div>
        <span>Sold</span>
    </div>

</div>

<div class="viewer" id="viewer">

    <div class="map" id="map">

        <div class="title">
            செந்தில்வேல் நகர்
        </div>

        <!-- Roads -->
        <div class="road-horizontal" style="top:90px; left:180px; width:900px; height:35px;"></div>

        <div class="road-horizontal" style="top:430px; left:160px; width:950px; height:35px;"></div>

        <div class="road-vertical" style="top:120px; left:520px; width:40px; height:620px;"></div>

        <!-- PLOTS AUTO GENERATED -->

    </div>

</div>

<div class="info-box">

    <h3>Plot Details</h3>

    <p><strong>Plot:</strong> <span id="plotNo">-</span></p>

    <p><strong>Status:</strong> <span id="plotStatus">-</span></p>

    <br>

    <small>Click any plot to change status</small>

</div>

<script>

/*
PLOT DATA
Approximate positions matching your map
*/

const plots = [

/* TOP LEFT */
{no:1,x:160,y:120,w:90,h:180},
{no:2,x:250,y:120,w:90,h:180},
{no:3,x:340,y:120,w:90,h:180},
{no:4,x:430,y:120,w:90,h:180},

/* MIDDLE LEFT */
{no:9,x:160,y:300,w:90,h:130},
{no:8,x:250,y:300,w:90,h:130},
{no:7,x:340,y:300,w:90,h:130},
{no:6,x:430,y:300,w:90,h:130},
{no:5,x:520,y:300,w:90,h:130},

/* BOTTOM LEFT */
{no:10,x:160,y:465,w:100,h:120},
{no:11,x:160,y:585,w:100,h:120},
{no:12,x:160,y:705,w:100,h:120},
{no:13,x:160,y:825,w:100,h:100},

{no:17,x:300,y:465,w:120,h:120},
{no:16,x:300,y:585,w:120,h:120},
{no:15,x:300,y:705,w:120,h:120},
{no:14,x:300,y:825,w:120,h:100},

{no:18,x:420,y:465,w:120,h:120},
{no:19,x:420,y:585,w:120,h:120},
{no:20,x:420,y:705,w:120,h:220},

/* RIGHT TOP */
{no:30,x:640,y:120,w:100,h:180},
{no:31,x:740,y:120,w:100,h:180},
{no:32,x:840,y:120,w:100,h:180},
{no:33,x:940,y:120,w:100,h:180},

/* RIGHT MIDDLE */
{no:29,x:640,y:300,w:100,h:130},
{no:28,x:740,y:300,w:100,h:130},
{no:27,x:840,y:300,w:100,h:130},
{no:26,x:940,y:300,w:100,h:130},
{no:25,x:1040,y:300,w:100,h:130},

/* RIGHT BOTTOM */
{no:22,x:640,y:465,w:120,h:150},
{no:21,x:640,y:615,w:120,h:180},

{no:23,x:760,y:465,w:120,h:150},
{no:24,x:880,y:465,w:120,h:150}

];

const map = document.getElementById("map");

plots.forEach(plot=>{

    const div = document.createElement("div");

    div.className = "plot unsold";

    div.style.left = plot.x + "px";
    div.style.top = plot.y + "px";
    div.style.width = plot.w + "px";
    div.style.height = plot.h + "px";

    div.innerHTML = plot.no;

    div.dataset.status = "Unsold";

    div.onclick = ()=>togglePlot(div, plot.no);

    map.appendChild(div);

});

function togglePlot(el, no){

    if(el.classList.contains("unsold")){

        el.classList.remove("unsold");
        el.classList.add("sold");
        el.dataset.status = "Sold";

    }else{

        el.classList.remove("sold");
        el.classList.add("unsold");
        el.dataset.status = "Unsold";
    }

    document.getElementById("plotNo").innerText = no;
    document.getElementById("plotStatus").innerText = el.dataset.status;
}

/* ZOOM + DRAG */

let scale = 1;
let posX = 0;
let posY = 0;

function applyTransform(){

    map.style.transform =
        `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function zoomIn(){

    scale += 0.1;
    applyTransform();
}

function zoomOut(){

    scale -= 0.1;

    if(scale < 0.5) scale = 0.5;

    applyTransform();
}

function resetView(){

    scale = 1;
    posX = 0;
    posY = 0;

    applyTransform();
}

const viewer = document.getElementById("viewer");

let dragging = false;
let startX, startY;

viewer.addEventListener("mousedown",(e)=>{

    dragging = true;

    startX = e.clientX - posX;
    startY = e.clientY - posY;

    viewer.style.cursor = "grabbing";
});

viewer.addEventListener("mouseup",()=>{

    dragging = false;

    viewer.style.cursor = "grab";
});

viewer.addEventListener("mousemove",(e)=>{

    if(!dragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    applyTransform();
});

viewer.addEventListener("wheel",(e)=>{

    e.preventDefault();

    if(e.deltaY < 0){

        scale += 0.1;

    }else{

        scale -= 0.1;

        if(scale < 0.5) scale = 0.5;
    }

    applyTransform();
});

</script>

</body>
</html>
